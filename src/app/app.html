<h1> Get and Set Input field</h1>

<input type ="text" 
value ="{{name}}"
(input) ="getName($event)"
placeholder="Enter user name">

<br>
<button (click) ="displayName()"> Get Value</button>
<button (click) ="setName()"> Set name</button>

<h1>counter APP</h1>
<div  style ="text-align: center;">
    <h1 class ="count">{{count}}</h1>
    <div>
    <button   (click) ="handleCount('minus')"  class = "btn bg-red">Decrement </button>
    <button (click) ="handleCount('reset')" class="btn bg-white">Reset </button>
    <button (click) ="handleCount('add')" class="btn bg-green">Increment </button>
    </div>
</div>
<div>
    <button (click) ="handleEvent($event)"  class ="btn"  name ="login">click event</button>
</div>
